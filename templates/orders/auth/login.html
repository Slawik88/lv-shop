{% extends "base.html" %}

{% block title %}Вход{% endblock %}

{% block content %}
<div class="max-w-md mx-auto">

  <div class="text-center mb-8">
    <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-4"
         style="background:linear-gradient(135deg,#bc8a54,#8a5c36);">
      <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
      </svg>
    </div>
    <h1 class="text-2xl font-bold" style="color:#3d3028;">Вход в аккаунт</h1>
    <p class="text-sm mt-1" style="color:#9a7860;">Войдите для доступа к профилю и заказам</p>
  </div>

  {% if error %}
  <div class="mb-4 p-3 rounded-xl text-sm font-medium"
       style="background:#fdf2f2; border:1px solid #f5c6c6; color:#c0392b;">
    {{ error }}
  </div>
  {% endif %}

  <form method="post" class="rounded-2xl p-6 space-y-5"
        style="background:#fffcf8; border:1px solid #e8ddd1; box-shadow:0 4px 16px rgba(90,59,36,.08);">
    {% csrf_token %}
    <input type="hidden" name="next" value="{{ next }}">

    <div>
      <label for="username" class="block text-sm font-medium mb-1.5" style="color:#5a3b24;">Логин *</label>
      <input type="text" id="username" name="username" required autofocus
             class="w-full rounded-xl px-4 py-2.5 text-sm"
             style="border:1px solid #e0cdb8; background:#fdf8f3; color:#3d3028;" />
    </div>

    <div>
      <label for="password" class="block text-sm font-medium mb-1.5" style="color:#5a3b24;">Пароль *</label>
      <input type="password" id="password" name="password" required
             class="w-full rounded-xl px-4 py-2.5 text-sm"
             style="border:1px solid #e0cdb8; background:#fdf8f3; color:#3d3028;" />
    </div>

    <button type="submit"
            class="w-full py-3 px-6 rounded-xl font-semibold text-white text-base shadow-md hover:shadow-lg transition-shadow"
            style="background:linear-gradient(135deg,#bc8a54,#8a5c36);">
      Войти
    </button>
  </form>

  <p class="text-center text-sm mt-6" style="color:#9a7860;">
    Нет аккаунта?
    <a href="{% url 'orders:register' %}" class="font-medium hover:underline" style="color:#bc8a54;">Зарегистрироваться</a>
  </p>

</div>
{% endblock %}
