{% extends "manager/base.html" %}

{% block title %}Подтвердить удаление{% endblock %}

{% block manager_content %}
<div class="max-w-md mx-auto">
  <div class="rounded-2xl border shadow-sm overflow-hidden" style="background:#fffcf8;border-color:#e8ddd1;">
    <div class="px-6 py-4 border-b" style="background:#fff5f5;border-color:#fec5c5;">
      <h1 class="text-xl font-bold" style="color:#991b1b;">Подтвердите удаление</h1>
    </div>
    <div class="p-6">
      <p class="text-sm mb-2" style="color:#5a3b24;">Вы уверены, что хотите удалить:</p>
      <p class="font-semibold text-base mb-5 px-3 py-2 rounded-lg" style="background:#fdf3e3;color:#3d3028;">{{ object_name }}</p>
      <p class="text-xs mb-6" style="color:#b09070;">Это действие нельзя отменить.</p>

      <div class="flex items-center gap-3">
        <form method="post">
          {% csrf_token %}
          <button type="submit"
                  class="px-5 py-2.5 rounded-xl text-sm font-semibold text-white shadow"
                  style="background:linear-gradient(135deg,#c0392b,#922b21);">
            Да, удалить
          </button>
        </form>
        <a href="{{ cancel_url }}"
           class="px-4 py-2.5 rounded-xl text-sm border"
           style="background:#fffcf8;border-color:#e0cdb8;color:#7a6050;">
          Отмена
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
